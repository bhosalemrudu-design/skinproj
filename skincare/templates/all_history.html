<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>All History</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
body {
  font-family: 'Poppins', sans-serif;
  background: #f5f7fa;
  padding: 20px;
}

.navbar {
  height: 60px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}

.navbar .logout {
  color: #ff4da6;
  cursor: pointer;
  font-weight: 500;
}

.history-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 15px;
}

.history-card {
  flex: 1 1 calc(33% - 15px);
  background: #fff;
  padding: 15px;
  border-radius: 20px;
  box-shadow: 0 3px 8px rgba(0,0,0,0.1);
  position: relative;
  font-size: 14px;
  margin-bottom: 10px;
}

.skin-type {
  position: absolute;
  top: 10px;
  left: 10px;
  color: #ff4da6;
  font-weight: 500;
  font-size: 13px;
}

.date {
  position: absolute;
  top: 10px;
  right: 10px;
  font-size: 13px;
}

.score {
  font-size: 28px;
  color: #000;
  margin: 25px 0 10px 0;
  font-weight: 400;
}

.profile-text {
  font-size: 13px;
  line-height: 1.4;
  color: #333;
}
</style>
</head>
<body>

<div class="navbar">
  <div>💖 Skinfinity</div>
  <div class="logout" onclick="window.location.href='/dashboard'">← Back to Dashboard</div>
</div>

<h2>All Analyses</h2>

<div class="history-grid">
  {% for item in history %}
  <div class="history-card">
    <div class="skin-type">{{ item[1] }}</div>
    <div class="date">📅 {{ item[3] }}</div>
    <div class="score">Score: {{ item[0] }}</div>
    <div class="profile-text">{{ item[2] }}</div>
  </div>
  {% endfor %}
</div>

</body>
</html>
